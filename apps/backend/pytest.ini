[pytest]
asyncio_default_fixture_loop_scope = function
markers =
    unit_core: Unit tests for application/core logic and dependency wiring
    unit_events: Unit tests for contracts, consumers, handlers, and realtime event logic
    integration_api: Integration tests for REST API routes and auth guards
    integration_realtime: Integration tests for websocket, catchup, and end-to-end event flows
    e2e: End-to-end tests that require Dockerized infrastructure
